<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Project Task Dashboard</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div id="app">
      <section class="auth-screen" data-auth-screen>
        <div class="auth-panel">
          <div>
            <p class="eyebrow">Project Task Dashboard</p>
            <h1>Manage projects, roles, and task progress.</h1>
          </div>

          <div class="auth-tabs" role="tablist" aria-label="Authentication">
            <button class="is-active" type="button" data-auth-tab="login">Login</button>
            <button type="button" data-auth-tab="signup">Signup</button>
          </div>

          <form class="stack" data-auth-form="login">
            <label>
              Email
              <input name="email" type="email" autocomplete="email" required>
            </label>
            <label>
              Password
              <input name="password" type="password" autocomplete="current-password" required>
            </label>
            <button class="primary" type="submit">Login</button>
          </form>

          <form class="stack is-hidden" data-auth-form="signup">
            <label>
              Name
              <input name="name" type="text" autocomplete="name" minlength="2" required>
            </label>
            <label>
              Email
              <input name="email" type="email" autocomplete="email" required>
            </label>
            <label>
              Password
              <input name="password" type="password" autocomplete="new-password" minlength="8" required>
            </label>
            <button class="primary" type="submit">Create account</button>
          </form>
        </div>
      </section>

      <main class="app-shell is-hidden" data-shell>
        <header class="topbar">
          <div>
            <p class="eyebrow">Workspace</p>
            <h1>Project Task Dashboard</h1>
          </div>
          <div class="topbar-actions">
            <span class="user-chip" data-user-chip></span>
            <button class="ghost" type="button" data-logout>Logout</button>
          </div>
        </header>

        <div class="layout">
          <aside class="sidebar">
            <nav class="nav-stack" aria-label="Primary">
              <button class="nav-item is-active" type="button" data-view="dashboard">Dashboard</button>
              <button class="nav-item" type="button" data-view="projects">Projects</button>
            </nav>

            <section class="panel tight">
              <h2>New project</h2>
              <form class="stack" data-project-form>
                <label>
                  Name
                  <input name="name" type="text" maxlength="120" required>
                </label>
                <label>
                  Description
                  <textarea name="description" rows="3" maxlength="1000"></textarea>
                </label>
                <button class="primary full" type="submit">Create project</button>
              </form>
            </section>
          </aside>

          <section class="content">
            <section data-panel="dashboard">
              <div class="section-heading">
                <div>
                  <p class="eyebrow">Overview</p>
                  <h2>Dashboard</h2>
                </div>
                <button class="ghost" type="button" data-refresh>Refresh</button>
              </div>
              <div data-dashboard></div>
            </section>

            <section class="is-hidden" data-panel="projects">
              <div class="section-heading">
                <div>
                  <p class="eyebrow">Projects</p>
                  <h2>Project & team management</h2>
                </div>
              </div>
              <div class="project-workspace">
                <div class="panel project-list-panel">
                  <h2>Your projects</h2>
                  <div class="project-list" data-project-list></div>
                </div>
                <div data-project-detail></div>
              </div>
            </section>
          </section>
        </div>
      </main>
    </div>

    <div class="toast" data-toast role="status" aria-live="polite"></div>
    <script src="/app.js"></script>
  </body>
</html>
